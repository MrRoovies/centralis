{% load static %}

<div class="venda-container">

    <!-- Header Clicável -->
    <div class="dropdown-header" onclick="dropdownhandler('dropdownVendaHeader', 'dropdownVendaBody')" id="dropdownVendaHeader">
        <h2>Registrar Venda</h2>
        <span class="dropdown-icon">▼</span>
    </div>

    <!-- Corpo do Formulário -->
    <div class="dropdown-body" id="dropdownVendaBody">
        <form id="vendaForm">
            {% csrf_token %}
            <input type="hidden" name="id_agenda" value="{{ nova_agenda.agenda.id }}">
            <input type="hidden" name="cliente_id" value="{{ cliente.id }}">

            <div class="form-row-inline">

                <div class="form-group">
                    <label for="id_venda-parceiro">
                        Parceiro
                        <span class="required">*</span>
                    </label>
                    <select name="venda-parceiro" class="form-control" id="id_venda-parceiro">
                    </select>
                </div>

                <div class="form-group">
                    <label for="id_venda-produto">
                        Produto
                        <span class="required">*</span>
                    </label>
                    <select name="venda-produto" class="form-control" id="id_venda-produto">
                    </select>
                </div>

                <div class="form-group">
                    <label for="id_venda-oferta">
                        Oferta
                        <span class="required">*</span>
                    </label>
                    {{ venda_form.oferta }}
                </div>

            </div>

            <div class="form-row-inline">

                <div class="form-group">
                    <label for="id_venda-contrato">
                        Nº Contrato
                        <span class="required">*</span>
                    </label>
                    {{ venda_form.contrato }}
                </div>

                <div class="form-group">
                    <label for="id_venda-prazo">
                        Prazo (meses)
                        <span class="required">*</span>
                    </label>
                    {{ venda_form.prazo }}
                </div>

                <div class="form-group">
                    <label for="id_venda-parcela">
                        Valor Parcela
                        <span class="required">*</span>
                    </label>
                    {{ venda_form.parcela }}
                </div>

            </div>

            <div class="form-row-inline">

                <div class="form-group">
                    <label for="id_venda-valor">
                        Valor Contrato
                        <span class="required">*</span>
                    </label>
                    {{ venda_form.valor }}
                </div>

                <div class="form-group">
                    <label>Detalhes da Oferta</label>
                    <span id="oferta-detalhe" class="oferta-detalhe-text">Selecione uma oferta...</span>
                </div>

            </div>

            <div class="btn-group">
                <button type="submit" class="btn btn-primary registrar-venda">
                    Registrar Venda
                </button>
                <button type="button" class="btn btn-secondary" onclick="limparVendaForm()">
                    Limpar
                </button>
            </div>

            <p class="form-hint">* Campos obrigatórios</p>
        </form>
    </div>
</div>
