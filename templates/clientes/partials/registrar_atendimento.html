<div class="atendimento-container">
        <!-- Header Clicável -->
    <div class="dropdown-header" onclick="dropdownhandler()" id="dropdownHeader">
        <h2>Registro de Atendimento</h2>
        <span class="dropdown-icon">▼</span>
    </div>

    <!-- Corpo do Formulário -->
    <div class="dropdown-body" id="dropdownBody">
        <form id="atendimentoForm">
            <input type="hidden" name="id_agenda" value="{{ nova_agenda.agenda.id }}">
            <!-- Situação, Data-Agenda e Telefone em linha -->
            <div class="form-row-inline">
                <div class="form-group">
                    <label for="situacao">
                        Situação
                        <span class="required">*</span>
                    </label>
                    <select id="situacao" name="situacao" required>
                        <option value="">Selecione...</option>
                        {% for situacao in situacoes %}
                        <option value="{{situacao.id}}" data-tipe="{{ situacao.tipo }}">{{ situacao.nome }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="dataAgenda">
                        Data-Agenda
                        <span class="required">*</span>
                    </label>
                    <input
                        type="datetime-local"
                        id="dataAgenda"
                        name="dataAgenda"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="telefone">
                        Telefone
                        <span class="required">*</span>
                    </label>
                    <input
                        type="tel"
                        id="telefone"
                        name="telefone"
                        placeholder="(00) 00000-0000"
                        required
                    >
                </div>
            </div>

            <!-- Comentário embaixo -->
            <div class="form-group">
                <label for="comentario">
                    Comentário
                </label>
                <textarea
                    id="comentario"
                    name="comentario"
                    placeholder="Digite observações sobre o atendimento..."
                ></textarea>
            </div>

            <!-- Botões -->
            <div class="btn-group">
                <button type="button" class="btn btn-primary" onclick="registrar()">
                    Salvar Atendimento
                </button>
                <button type="submit" class="btn btn-secondary" onclick="limparFormulario()">
                    Limpar
                </button>
            </div>

            <p class="form-hint">* Campos obrigatórios</p>
        </form>
    </div>
</div>
